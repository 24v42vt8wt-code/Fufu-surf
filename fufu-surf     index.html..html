// UI
// ═══════════════════════════════════════════════════════════════════
function syncHUD(){
  document.getElementById("hScore").textContent=Math.floor(G.score);
  document.getElementById("hCoins").textContent=coins;
  document.getElementById("hLives").textContent=G.lives;
  document.getElementById("menuCoins").textContent=`🪙 ${coins} munten`;
}

function show(s){
  // Hide all overlays, then show the right one
  ["menu","skins","maps","shop","over"].forEach(id=>{
    const el = document.getElementById("ov"+id.charAt(0).toUpperCase()+id.slice(1));
    if(el) el.classList.toggle("hide", s!==id);
  });
  document.getElementById("hud").classList.toggle("hide",s!=="playing");
  if(s==="menu"){updateMenuUI();}
  if(s==="shop"){updateShopUI();}
  if(s==="skins"){updateSkinsUI();}
  if(s==="maps"){updateMapsUI();}
}

function updateMenuUI(){
  document.getElementById("menuCoins").textContent=`🪙 ${coins} munten`;
  document.getElementById("selInfo").textContent=`${SKINS[selSkin].emoji} ${SKINS[selSkin].name} · ${MAPS[selMap].emoji} ${MAPS[selMap].name}`;
  document.getElementById("menuHsValue").textContent=highscore.toLocaleString();
}

function updateShopUI(){
  document.getElementById("shopCoins").textContent=`🪙 ${coins}`;
  const g=document.getElementById("shopGrid");g.innerHTML="";
  const shopRarity = {
    chef:  {tier:"Gewoon",      bg:"linear-gradient(135deg,#1e293b,#334155)", border:"#475569", col:"#94a3b8"},
    robot: {tier:"Zeldzaam",    bg:"linear-gradient(135deg,#1e3a5f,#1d4ed8)", border:"#3b82f6", col:"#93c5fd"},
    ghost: {tier:"Zeldzaam",    bg:"linear-gradient(135deg,#1e1b4b,#4338ca)", border:"#818cf8", col:"#a5b4fc"},
    ninja: {tier:"Zeldzaam",    bg:"linear-gradient(135deg,#1e1b4b,#4338ca)", border:"#818cf8", col:"#a5b4fc"},
    clown: {tier:"Zeldzaam",    bg:"linear-gradient(135deg,#1e1b4b,#4338ca)", border:"#818cf8", col:"#a5b4fc"},
    fire:  {tier:"Episch",      bg:"linear-gradient(135deg,#3b0764,#7e22ce)", border:"#a855f7", col:"#d8b4fe"},
    alien: {tier:"Episch",      bg:"linear-gradient(135deg,#3b0764,#7e22ce)", border:"#a855f7", col:"#d8b4fe"},
    zombie:{tier:"Episch",      bg:"linear-gradient(135deg,#3b0764,#7e22ce)", border:"#a855f7", col:"#d8b4fe"},
    wizard:{tier:"Episch",      bg:"linear-gradient(135deg,#3b0764,#7e22ce)", border:"#a855f7", col:"#d8b4fe"},
    dino:  {tier:"Legendarisch",bg:"linear-gradient(135deg,#451a03,#b45309)", border:"#f59e0b", col:"#fcd34d"},
    angel: {tier:"Legendarisch",bg:"linear-gradient(135deg,#451a03,#b45309)", border:"#f59e0b", col:"#fcd34d"},
    dragon:{tier:"Legendarisch",bg:"linear-gradient(135deg,#451a03,#b45309)", border:"#f59e0b", col:"#fcd34d"},
    king:  {tier:"Legendarisch",bg:"linear-gradient(135deg,#451a03,#b45309)", border:"#f59e0b", col:"#fcd34d"},
    fufu:  {tier:"Mythisch",    bg:"linear-gradient(135deg,#1a0030,#4c0080,#001a40)", border:"#cc00ff", col:"#f0abfc"},
  };

  SKINS.forEach((sk,i)=>{
    const isOwned=owned.includes(sk.id),canBuy=!isOwned&&coins>=sk.price;
    const r=shopRarity[sk.id]||shopRarity.chef;
    const d=document.createElement("div");
    d.className="scard"+(isOwned?" owned":"");
    d.style.background = isOwned ? "" : r.bg;
    d.style.border = `2px solid ${isOwned?"#22c55e":r.border}`;
    d.style.boxShadow = isOwned ? "" : (canBuy ? `0 0 10px ${r.border}66` : "");
    d.innerHTML=
      `<div style="font-size:2rem">${sk.emoji}</div>`+
      `<div style="font-size:0.72rem;font-weight:800;color:#fff;margin:3px 0">${sk.name}</div>`+
      `<div style="font-size:0.52rem;font-weight:800;color:${r.col};text-transform:uppercase;letter-spacing:0.04em;margin-bottom:2px">${r.tier}</div>`+
      (isOwned
        ?`<div style="font-size:0.65rem;color:#4ade80;font-weight:700">✓ Eigendom</div>`
        :`<div style="font-size:0.68rem;color:#fbbf24;font-weight:700;margin-bottom:4px">🪙 ${sk.price.toLocaleString()}</div><button class="buybtn" style="background:${canBuy?"linear-gradient(135deg,#f59e0b,#d97706)":"rgba(100,100,100,0.3)"};${canBuy?"":"cursor:not-allowed"}">${canBuy?"Kopen!":"Te weinig 🪙"}</button>`);
    if(!isOwned&&canBuy)d.querySelector("button").onclick=()=>{coins-=sk.price;owned.push(sk.id);save();updateShopUI();};
    g.appendChild(d);
  });
}

  const g=document.getElementById("skinGrid");g.innerHTML="";
  const rarity = {
    chef:   {tier:"Gewoon",    bg:"linear-gradient(135deg,#1e293b,#334155)",  border:"#475569",     label:"#94a3b8",  glow:""},
    robot:  {tier:"Zeldzaam",  bg:"linear-gradient(135deg,#1e3a5f,#1d4ed8)",  border:"#3b82f6",     label:"#93c5fd",  glow:"0 0 10px rgba(59,130,246,0.4)"},
    ghost:  {tier:"Zeldzaam",  bg:"linear-gradient(135deg,#1e1b4b,#4338ca)",  border:"#818cf8",     label:"#a5b4fc",  glow:"0 0 10px rgba(129,140,248,0.4)"},
    ninja:  {tier:"Zeldzaam",  bg:"linear-gradient(135deg,#1e1b4b,#4338ca)",  border:"#818cf8",     label:"#a5b4fc",  glow:"0 0 10px rgba(129,140,248,0.4)"},
    clown:  {tier:"Zeldzaam",  bg:"linear-gradient(135deg,#1e1b4b,#4338ca)",  border:"#818cf8",     label:"#a5b4fc",  glow:"0 0 10px rgba(129,140,248,0.4)"},
    fire:   {tier:"Episch",    bg:"linear-gradient(135deg,#3b0764,#7e22ce)",  border:"#a855f7",     label:"#d8b4fe",  glow:"0 0 12px rgba(168,85,247,0.5)"},
    alien:  {tier:"Episch",    bg:"linear-gradient(135deg,#3b0764,#7e22ce)",  border:"#a855f7",     label:"#d8b4fe",  glow:"0 0 12px rgba(168,85,247,0.5)"},
    zombie: {tier:"Episch",    bg:"linear-gradient(135deg,#3b0764,#7e22ce)",  border:"#a855f7",     label:"#d8b4fe",  glow:"0 0 12px rgba(168,85,247,0.5)"},
    wizard: {tier:"Episch",    bg:"linear-gradient(135deg,#3b0764,#7e22ce)",  border:"#a855f7",     label:"#d8b4fe",  glow:"0 0 12px rgba(168,85,247,0.5)"},
    dino:   {tier:"Legendarisch",bg:"linear-gradient(135deg,#451a03,#b45309)",border:"#f59e0b",     label:"#fcd34d",  glow:"0 0 14px rgba(245,158,11,0.55)"},
    angel:  {tier:"Legendarisch",bg:"linear-gradient(135deg,#451a03,#b45309)",border:"#f59e0b",     label:"#fcd34d",  glow:"0 0 14px rgba(245,158,11,0.55)"},
    dragon: {tier:"Legendarisch",bg:"linear-gradient(135deg,#451a03,#b45309)",border:"#f59e0b",     label:"#fcd34d",  glow:"0 0 14px rgba(245,158,11,0.55)"},
    king:   {tier:"Legendarisch",bg:"linear-gradient(135deg,#451a03,#b45309)",border:"#f59e0b",     label:"#fcd34d",  glow:"0 0 14px rgba(245,158,11,0.55)"},
    fufu:   {tier:"Mythisch",  bg:"linear-gradient(135deg,#1a0030,#4c0080,#001a40)", border:"#cc00ff", label:"#f0abfc", glow:"0 0 18px rgba(200,0,255,0.65), 0 0 4px rgba(255,100,255,0.4)"},
  };

  SKINS.forEach((sk,i)=>{
    const isOwned=owned.includes(sk.id);
    const r=rarity[sk.id]||rarity.chef;
    const isSelected=selSkin===i&&isOwned;
    const d=document.createElement("div");
    d.className="card"+(isSelected?" sel":"")+(isOwned?"":" locked");
    // Apply rarity background and border
    d.style.background = isSelected ? "" : r.bg;
    d.style.border = `2px solid ${isSelected?"#ffb347":r.border}`;
    d.style.boxShadow = isSelected ? "0 0 12px rgba(255,179,71,0.3)" : r.glow;
    // Rarity label
    const rarityLabel = `<div style="font-size:0.52rem;font-weight:800;color:${r.label};letter-spacing:0.04em;text-transform:uppercase;margin-top:2px;opacity:0.9">${r.tier}</div>`;
    d.innerHTML=`<div class="ce">${sk.emoji}</div><div class="cn">${sk.name}</div>`+
      rarityLabel+
      (!isOwned?`<div class="cp">🪙${sk.price.toLocaleString()}</div>`:(isSelected?`<div class="ck">✓</div>`:""));
    d.onclick=()=>{if(isOwned){selSkin=i;save();updateSkinsUI();}else show("shop");};
    g.appendChild(d);
  });
}

function updateMapsUI(){
  const g=document.getElementById("mapList");g.innerHTML="";
  MAPS.forEach((mp,i)=>{
    const isPremium=!!mp.price;
    const isOwned=!isPremium||ownedMaps.includes(mp.id);
    const canBuy=isPremium&&!isOwned&&coins>=mp.price;
    const d=document.createElement("div");
    d.className="mcard"+(selMap===i&&isOwned?" sel":"");
    d.style.opacity=isOwned?"1":"0.55";
    let badge="";
    if(isPremium&&!isOwned) badge=`<span style="color:#fbbf24;font-size:0.68rem;font-weight:800"> · 🪙${mp.price.toLocaleString()}</span>`;
    if(isPremium&&isOwned)  badge=`<span style="color:#4ade80;font-size:0.68rem"> · ✓ Premium</span>`;
    const mpDesc = mp.id==="volcano"?"🌋 Lava":mp.id==="golden"?"✨ Goud":mp.id==="legend"?"🌈 Legendarisch":mp.stars?"⭐ Sterren":"";
    // Special border for legendary
    if(mp.id==="legend"){
      d.style.background="linear-gradient(135deg,rgba(120,0,180,0.3),rgba(0,50,150,0.3))";
      d.style.border="2px solid rgba(180,0,255,0.6)";
      d.style.boxShadow=isOwned?"0 0 16px rgba(180,0,255,0.4)":"none";
    }
    d.innerHTML=`<div style="font-size:1.8rem;flex-shrink:0">${mp.emoji}</div><div style="flex:1"><div style="font-weight:800;font-size:0.9rem;color:${mp.id==="legend"?"#cc00ff":"#fff"}">${mp.name}${badge}</div><div style="color:rgba(255,255,255,0.35);font-size:0.68rem">${mpDesc}</div></div>`+
      (isPremium&&!isOwned?`<button style="border:none;border-radius:8px;padding:5px 10px;font-size:0.7rem;font-weight:800;cursor:${canBuy?"pointer":"not-allowed"};background:${canBuy?mp.id==="legend"?"linear-gradient(135deg,#7c00cc,#cc00ff)":"linear-gradient(135deg,#f59e0b,#d97706)":"rgba(100,100,100,0.4)"};color:#fff;font-family:sans-serif">${canBuy?"Kopen!":"Te weinig 🪙"}</button>`:"");
    if(isOwned){
      d.onclick=()=>{selMap=i;save();updateMapsUI();};
    } else if(canBuy){
      d.querySelector("button").onclick=(e)=>{e.stopPropagation();coins-=mp.price;ownedMaps.push(mp.id);save();updateMapsUI();updateMenuUI();};
    }
    g.appendChild(d);
  });
}

function startGame(){
  curSkin=SKINS[selSkin]; curMap=MAPS[selMap];
  initG(); G.running=true;
  G.powerups=[]; G.nextPowerup=300;
  G.shield=0; G.magnet=0; G.doubleScore=0; G.speedBoost=0;
  syncHUD(); show("playing");
}

// Power-up toast notification
let _toastTimer;
function showPowerupToast(txt){
  let el=document.getElementById("puToast");
  if(!el){el=document.createElement("div");el.id="puToast";el.style.cssText="position:fixed;top:16%;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(0,0,0,0.78);color:#fff;font-size:1.05rem;font-weight:900;padding:8px 22px;border-radius:50px;pointer-events:none;opacity:0;transition:opacity 0.25s,transform 0.25s;z-index:9999;backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.18)";document.body.appendChild(el);}
  el.textContent=txt;el.style.opacity="1";el.style.transform="translateX(-50%) translateY(0)";
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{el.style.opacity="0";el.style.transform="translateX(-50%) translateY(-8px)";},1800);
}

show("menu");
syncHUD();
</script>
</body>
</html>
